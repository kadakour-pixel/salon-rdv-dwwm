<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon profil — Salon Élégance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/pages.css" />
</head>
<body>

  <header class="navbar" role="banner">
    <div class="container navbar__inner">
      <a href="../index.html" class="navbar__logo">Élégance<span style="color:var(--accent)">.</span></a>
      <nav class="navbar__links"><a href="../index.html">Accueil</a><a href="reserver.html">Réserver</a></nav>
      <div class="navbar__actions"></div>
      <button class="navbar__burger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </header>

  <div class="page-wrapper">
    <div class="container" style="max-width:560px;">

      <div class="page-header">
        <p class="eyebrow">Espace client</p>
        <h1>Mon profil</h1>
        <p>Modifiez vos informations personnelles.</p>
      </div>

      <div class="card">
        <div id="profilAlert" class="form-alert" role="alert" style="display:none;"></div>

        <form id="profilForm" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label for="profilFirstName">Prénom</label>
              <input type="text" id="profilFirstName" autocomplete="given-name" required />
            </div>
            <div class="form-group">
              <label for="profilLastName">Nom</label>
              <input type="text" id="profilLastName" autocomplete="family-name" required />
            </div>
          </div>
          <div class="form-group">
            <label for="profilEmail">Adresse e-mail</label>
            <input type="email" id="profilEmail" autocomplete="email" required />
          </div>

          <div style="display:flex;justify-content:flex-end;gap:.75rem;margin-top:.5rem;">
            <a href="mes-rdv.html" class="btn btn-outline">Annuler</a>
            <button type="submit" class="btn btn-accent" id="profilSubmit">Enregistrer</button>
          </div>
        </form>
      </div>

    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/profil.js"></script>
</body>
</html>
