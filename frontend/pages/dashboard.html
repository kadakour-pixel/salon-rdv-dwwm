<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Admin — Salon Élégance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>

  <header class="navbar" role="banner">
    <div class="container navbar__inner">
      <a href="../index.html" class="navbar__logo">Élégance<span style="color:var(--accent)">.</span></a>
      <div class="navbar__actions"></div>
    </div>
  </header>

  <div class="dash-layout">

    <!-- Sidebar -->
    <aside class="dash-sidebar" aria-label="Navigation admin">
      <div class="dash-sidebar__logo">Élégance<span>.</span> <small style="display:block;font-family:var(--font-ui);font-size:.7rem;color:rgba(255,255,255,.4);margin-top:.2rem;">Administration</small></div>
      <nav class="dash-nav">
        <a href="#" class="active" data-tab="agenda"><span class="dash-nav__icon">📅</span> Agenda</a>
        <a href="#" data-tab="services"><span class="dash-nav__icon">✂️</span> Prestations</a>
        <a href="#" data-tab="clients"><span class="dash-nav__icon">👥</span> Rendez-vous</a>
        <a href="#" data-tab="horaires"><span class="dash-nav__icon">⏰</span> Horaires</a>
      </nav>
    </aside>

    <!-- Contenu principal -->
    <main class="dash-main" id="dashMain">

      <!-- Métriques -->
      <div class="metrics-grid" id="metricsGrid">
        <div class="metric-card"><p class="metric-card__label">RDV aujourd'hui</p><p class="metric-card__value" id="metToday">—</p></div>
        <div class="metric-card"><p class="metric-card__label">RDV cette semaine</p><p class="metric-card__value" id="metWeek">—</p></div>
        <div class="metric-card"><p class="metric-card__label">Prestations actives</p><p class="metric-card__value" id="metServices">—</p></div>
        <div class="metric-card"><p class="metric-card__label">Annulations</p><p class="metric-card__value" id="metCancelled">—</p></div>
      </div>

      <!-- Tabs -->
      <div class="dash-tabs" role="tablist">
        <button class="dash-tab active" data-tab="agenda" role="tab" aria-selected="true">📅 Agenda du jour</button>
        <button class="dash-tab" data-tab="services" role="tab" aria-selected="false">✂️ Prestations</button>
        <button class="dash-tab" data-tab="clients" role="tab" aria-selected="false">👥 Tous les RDV</button>
        <button class="dash-tab" data-tab="horaires" role="tab" aria-selected="false">⏰ Horaires</button>
      </div>

      <!-- Panel Agenda -->
      <div class="dash-panel active" id="panel-agenda" role="tabpanel">
        <div class="agenda-toolbar">
          <div class="agenda-date-nav">
            <button id="agendaPrev" aria-label="Jour précédent">‹</button>
            <strong id="agendaDateLabel"></strong>
            <button id="agendaNext" aria-label="Jour suivant">›</button>
          </div>
          <button class="btn btn-outline" id="agendaToday" style="padding:.4rem 1rem;font-size:.82rem;">Aujourd'hui</button>
        </div>
        <div id="agendaList" class="agenda-list" role="list" aria-live="polite">
          <div class="loader"><div class="spinner"></div> Chargement…</div>
        </div>
      </div>

      <!-- Panel Prestations -->
      <div class="dash-panel" id="panel-services" role="tabpanel">
        <div style="display:flex;justify-content:flex-end;margin-bottom:1rem;">
          <button class="btn btn-accent" id="btnAddService">+ Ajouter une prestation</button>
        </div>
        <div class="card" style="padding:0;overflow:hidden;">
          <table class="service-table" id="serviceTable">
            <thead><tr><th>Prestation</th><th>Durée</th><th>Prix</th><th>Statut</th><th></th></tr></thead>
            <tbody id="serviceTableBody">
              <tr><td colspan="5"><div class="loader"><div class="spinner"></div> Chargement…</div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Panel Tous les RDV -->
      <div class="dash-panel" id="panel-clients" role="tabpanel">
        <div class="agenda-toolbar">
          <label for="clientsDateFilter" style="font-size:.85rem;font-weight:500;">Filtrer par date :</label>
          <input type="date" id="clientsDateFilter" style="padding:.4rem .75rem;border:1.5px solid var(--border);border-radius:var(--radius-md);font-size:.85rem;" />
          <button class="btn btn-outline" id="btnClearFilter" style="padding:.4rem .9rem;font-size:.82rem;">Tout afficher</button>
        </div>
        <div id="clientsList" class="agenda-list" role="list" aria-live="polite">
          <div class="loader"><div class="spinner"></div> Chargement…</div>
        </div>
      </div>

      <!-- Panel Horaires -->
      <div class="dash-panel" id="panel-horaires" role="tabpanel">
        <div id="horairesList">
          <div class="loader"><div class="spinner"></div> Chargement…</div>
        </div>
      </div>

    </main>
  </div>

  <!-- Modal service -->
  <div class="modal-overlay hidden" id="serviceModal" role="dialog" aria-modal="true" aria-labelledby="serviceModalTitle">
    <div class="modal">
      <h3 id="serviceModalTitle">Ajouter une prestation</h3>
      <div id="serviceModalAlert" style="display:none;" class="form-alert"></div>
      <form id="serviceForm" novalidate>
        <input type="hidden" id="serviceId" />
        <div class="form-group">
          <label for="serviceName">Nom</label>
          <input type="text" id="serviceName" placeholder="Ex : Coupe femme" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="serviceDuration">Durée (min)</label>
            <input type="number" id="serviceDuration" min="15" step="15" placeholder="60" required />
          </div>
          <div class="form-group">
            <label for="servicePrice">Prix (€)</label>
            <input type="number" id="servicePrice" min="0" step="0.01" placeholder="45.00" required />
          </div>
        </div>
        <div class="modal__actions">
          <button type="button" class="btn btn-outline" id="serviceModalClose">Annuler</button>
          <button type="submit" class="btn btn-accent" id="serviceSubmit">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  
  <!-- Modal horaires -->
  <div class="modal-overlay hidden" id="horairesModal" role="dialog" aria-modal="true" aria-labelledby="horairesModalTitle">
    <div class="modal">
      <h3 id="horairesModalTitle">Modifier les horaires</h3>
      <div id="horairesModalAlert" style="display:none;" class="form-alert"></div>
      <form id="horairesForm" novalidate>
        <input type="hidden" id="horairesDay" />
        <div class="form-row">
          <div class="form-group">
            <label for="horairesOpen">Ouverture</label>
            <input type="time" id="horairesOpen" required />
          </div>
          <div class="form-group">
            <label for="horairesClose">Fermeture</label>
            <input type="time" id="horairesClose" required />
          </div>
        </div>
        <div class="modal__actions">
          <button type="button" class="btn btn-outline" id="horairesModalClose">Annuler</button>
          <button type="submit" class="btn btn-accent" id="horairesSubmit">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
