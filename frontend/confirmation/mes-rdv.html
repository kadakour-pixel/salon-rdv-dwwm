<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes rendez-vous — Salon Élégance</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/pages.css" />
  <style>
    .rdv-filters {
      display: flex;
      gap: .5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: .4rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 99px;
      background: var(--surface);
      font-size: .82rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
    }
    .filter-btn.active, .filter-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

    .rdv-list { display: flex; flex-direction: column; gap: .75rem; }

    .rdv-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      transition: box-shadow var(--transition);
    }
    .rdv-card:hover { box-shadow: var(--shadow-sm); }
    .rdv-card--cancelled { opacity: .6; }

    .rdv-card__date {
      background: var(--accent-bg);
      border-radius: var(--radius-md);
      padding: .6rem .8rem;
      text-align: center;
      min-width: 56px;
      flex-shrink: 0;
    }
    .rdv-card__date-day   { font-family: var(--font-main); font-size: 1.6rem; font-weight: 700; color: var(--accent); line-height: 1; }
    .rdv-card__date-month { font-size: .65rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); }

    .rdv-card__info { flex: 1; }
    .rdv-card__service { font-weight: 600; margin-bottom: .2rem; }
    .rdv-card__meta { font-size: .82rem; color: var(--text-muted); }

    .rdv-card__actions { display: flex; align-items: center; gap: .75rem; flex-shrink: 0; }

    .btn-cancel {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-xl);
      padding: .4rem .9rem;
      font-size: .8rem;
      font-weight: 500;
      color: var(--error);
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition);
    }
    .btn-cancel:hover { background: var(--error-bg); border-color: var(--error); }

    /* Modal confirmation annulation */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 200;
      display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.hidden { display: none; }
    .modal {
      background: var(--surface);
      border-radius: var(--radius-lg);
      padding: 2rem;
      max-width: 400px;
      width: 100%;
      box-shadow: var(--shadow-lg);
    }
    .modal h3 { margin-bottom: .75rem; }
    .modal p  { color: var(--text-muted); font-size: .9rem; margin-bottom: 1.5rem; }
    .modal__actions { display: flex; gap: .75rem; justify-content: flex-end; }
  </style>
</head>
<body>

  <header class="navbar" role="banner">
    <div class="container navbar__inner">
      <a href="../index.html" class="navbar__logo">Élégance<span style="color:var(--accent)">.</span></a>
      <nav class="navbar__links"><a href="../index.html">Accueil</a><a href="reserver.html">Réserver</a></nav>
      <div class="navbar__actions"></div>
      <button class="navbar__burger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </header>

  <div class="page-wrapper">
    <div class="container">
      <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
        <div>
          <p class="eyebrow">Espace client</p>
          <h1>Mes rendez-vous</h1>
        </div>
        <a href="reserver.html" class="btn btn-accent">+ Nouveau RDV</a>
      </div>

      <!-- Filtres -->
      <div class="rdv-filters" role="group" aria-label="Filtrer les rendez-vous">
        <button class="filter-btn active" data-filter="all">Tous</button>
        <button class="filter-btn" data-filter="confirmed">À venir</button>
        <button class="filter-btn" data-filter="cancelled">Annulés</button>
      </div>

      <!-- Liste -->
      <div id="rdvList" class="rdv-list" role="list" aria-live="polite" aria-busy="true">
        <div class="loader"><div class="spinner"></div> Chargement de vos rendez-vous…</div>
      </div>
    </div>
  </div>

  <!-- Modal annulation -->
  <div class="modal-overlay hidden" id="cancelModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <h3 id="modalTitle">Annuler ce rendez-vous ?</h3>
      <p id="modalBody">Cette action est irréversible. Le créneau sera libéré immédiatement.</p>
      <div class="modal__actions">
        <button class="btn btn-outline" id="modalCancel">Non, garder</button>
        <button class="btn btn-primary" id="modalConfirm" style="background:var(--error);">Oui, annuler</button>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>
  <script>
  const MONTHS = ['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'];

  let allRdv = [];
  let currentFilter = 'all';
  let rdvToCancel = null;

  document.addEventListener('DOMContentLoaded', async () => {
    if (!Auth.isLogged()) { window.location.href = 'login.html'; return; }
    await loadRdv();
  });

  async function loadRdv() {
    const list = document.getElementById('rdvList');
    list.setAttribute('aria-busy', 'true');
    try {
      allRdv = await apiRequest('/appointments/me');
      renderList();
    } catch(err) {
      list.innerHTML = `<p style="color:var(--error);padding:2rem 0;">${err.message}</p>`;
    } finally {
      list.setAttribute('aria-busy', 'false');
    }
  }

  function renderList() {
    const list = document.getElementById('rdvList');
    let filtered = allRdv;
    if (currentFilter === 'confirmed') filtered = allRdv.filter(r => r.status !== 'cancelled' && new Date(r.start_at) >= new Date());
    if (currentFilter === 'cancelled') filtered = allRdv.filter(r => r.status === 'cancelled');

    if (!filtered.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-state__icon">📅</div>
          <h3>Aucun rendez-vous</h3>
          <p>${currentFilter === 'cancelled' ? 'Vous n\'avez aucun rendez-vous annulé.' : 'Vous n\'avez pas encore de rendez-vous.'}</p>
          <a href="reserver.html" class="btn btn-accent">Prendre un RDV</a>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map(rdv => {
      const start = new Date(rdv.start_at);
      const day   = start.getDate();
      const month = MONTHS[start.getMonth()];
      const time  = start.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
      const isFuture = start > new Date() && rdv.status !== 'cancelled';
      const statusLabel = rdv.status === 'cancelled' ? 'Annulé' : rdv.status === 'confirmed' ? 'Confirmé' : 'En attente';

      return `
        <div class="rdv-card ${rdv.status === 'cancelled' ? 'rdv-card--cancelled' : ''}" role="listitem">
          <div class="rdv-card__date" aria-hidden="true">
            <div class="rdv-card__date-day">${day}</div>
            <div class="rdv-card__date-month">${month}</div>
          </div>
          <div class="rdv-card__info">
            <p class="rdv-card__service">${rdv.service_name}</p>
            <p class="rdv-card__meta">${time} · ${rdv.price} € </p>
          </div>
          <div class="rdv-card__actions">
            <span class="badge badge--${rdv.status}">${statusLabel}</span>
            ${isFuture ? `<button class="btn-cancel" data-id="${rdv.id}" data-name="${rdv.service_name}" data-time="${time}" aria-label="Annuler ce rendez-vous">Annuler</button>` : ''}
          </div>
        </div>`;
    }).join('');

    // Boutons annulation
    list.querySelectorAll('.btn-cancel').forEach(btn => {
      btn.addEventListener('click', () => {
        rdvToCancel = btn.dataset.id;
        document.getElementById('modalBody').textContent =
          `${btn.dataset.name} le ${btn.closest('.rdv-card').querySelector('.rdv-card__date-day').textContent} à ${btn.dataset.time}. Cette action est irréversible.`;
        document.getElementById('cancelModal').classList.remove('hidden');
      });
    });
  }

  // Filtres
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      renderList();
    });
  });

  // Modal
  document.getElementById('modalCancel').addEventListener('click', () => {
    document.getElementById('cancelModal').classList.add('hidden');
    rdvToCancel = null;
  });
  document.getElementById('cancelModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) { document.getElementById('cancelModal').classList.add('hidden'); }
  });
  document.getElementById('modalConfirm').addEventListener('click', async () => {
    const btn = document.getElementById('modalConfirm');
    btn.disabled = true; btn.textContent = 'Annulation…';
    try {
      await apiRequest(`/appointments/${rdvToCancel}`, { method: 'DELETE' });
      document.getElementById('cancelModal').classList.add('hidden');
      showToast('Rendez-vous annulé avec succès.');
      await loadRdv();
    } catch(err) {
      showToast(err.message || 'Erreur lors de l\'annulation.', 'error');
    } finally {
      btn.disabled = false; btn.textContent = 'Oui, annuler';
      rdvToCancel = null;
    }
  });
  </script>
</body>
</html>
